{% extends 'base.html' %}
{% block title %}Manager Login — {{ app_title }}{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-9 col-md-6 col-lg-4">

      <div class="text-center mb-4">
        <i class="bi bi-sliders2 text-primary" style="font-size:3rem;"></i>
        <h2 class="mt-2 fw-bold">{{ app_title }}</h2>
        <p class="text-muted small">Kirtan Manager Access</p>
      </div>

      <div class="card shadow-sm">
        <div class="card-body p-4">
          {% if error %}
          <div class="alert alert-danger d-flex align-items-center gap-2">
            <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
            {{ error }}
          </div>
          {% endif %}

          <form method="POST" action="{{ url_for('manage.login') }}" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

            <div class="mb-3">
              <label for="username" class="form-label fw-semibold">Username</label>
              <input type="text" class="form-control form-control-lg" id="username"
                     name="username" required autocomplete="username" autofocus />
            </div>

            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <input type="password" class="form-control form-control-lg" id="password"
                       name="password" required autocomplete="current-password" />
                <button class="btn btn-outline-secondary" type="button" id="togglePw"
                        aria-label="Show/hide password">
                  <i class="bi bi-eye" id="pwIcon"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">
              <i class="bi bi-box-arrow-in-right me-1"></i>Sign in
            </button>
          </form>
        </div>
      </div>

      <p class="text-center mt-3 mb-0">
        <a href="{{ url_for('public.index') }}" class="text-muted small">
          <i class="bi bi-arrow-left me-1"></i>Back to home
        </a>
      </p>

    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('togglePw')?.addEventListener('click', function () {
  const pw = document.getElementById('password');
  const ic = document.getElementById('pwIcon');
  if (pw.type === 'password') { pw.type = 'text'; ic.className = 'bi bi-eye-slash'; }
  else { pw.type = 'password'; ic.className = 'bi bi-eye'; }
});
</script>
{% endblock %}
