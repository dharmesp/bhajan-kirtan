# fly.toml app configuration file generated for shrikirtan on 2026-04-17T23:53:51-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'shrikirtan'
primary_region = 'ord'

[build]

# SQLite lives on this persistent 10 GB volume
[[mounts]]
  source      = 'shrikirtan_data'
  destination = '/data'

[env]
  DATABASE_URL = 'sqlite:////data/shrikirtan.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep exactly 1 machine — volumes can only attach to one at a time
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
